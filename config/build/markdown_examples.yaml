  max_minutes: 120
- script: scripts/imaging/start_here.py
  max_minutes: 240
- script: scripts/imaging/simulator.py
  max_minutes: 45
- script: scripts/imaging/likelihood_function.py
  max_minutes: 45
- script: scripts/imaging/fit.py
  max_minutes: 45
- script: scripts/imaging/modeling.py
  max_minutes: 240
- script: scripts/interferometer/start_here.py
  max_minutes: 240
- script: scripts/interferometer/simulator.py
