# Workspace overrides for the library latent toggles. The PyAutoGalaxy
# library defaults `total_galaxy_0_flux` to `true` (no instrument inputs
# needed) and `total_galaxy_0_flux_mujy` to `false`. Enabling the µJy
# variant here means a workspace fit produces microjansky output as long
# as the user also passes `magzero` to `ag.AnalysisImaging(...)` — without
# `magzero` it returns NaN + one warning per process.
#
# Run `scripts/guides/results/latent_variables.py` for a tutorial on
# what each key means and `scripts/guides/units/flux.py` for how to
# convert a raw-flux latent to microjanskies in post.

# `total_galaxy_0_flux` — total integrated flux of `fit.galaxies[0]` in
# the fit's raw image units. No instrument inputs required.
total_galaxy_0_flux: true

# `total_galaxy_0_flux_mujy` — same flux converted to microjanskies via
# magzero. Requires `magzero` via Analysis kwargs; returns NaN + one
# warning per process if missing.
total_galaxy_0_flux_mujy: true
